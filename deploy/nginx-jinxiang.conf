server {
    listen 443 ssl;
    server_name jinxiang.eatrice.cn;

    ssl_certificate /usr/crt/fullchain.pem;
    ssl_certificate_key /usr/crt/privkey.pem;
    ssl_session_timeout 5m;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_prefer_server_ciphers on;

    root /opt/borad-vue3/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html?$query_string;
    }

    # The frontend calls /api/borad/{page}/{page_size} and /api/borad/health.
    # This block maps both requests to the Flask backend on 127.0.0.1:52000.
    location /api/borad/ {
        proxy_pass http://127.0.0.1:52000/api/borad/;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
